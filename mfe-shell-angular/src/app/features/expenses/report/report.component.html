<section class="header-row">
    <app-header></app-header>
    <app-filter class="filter"></app-filter>
</section>
<div class="report-page">
    <section class="summarize-section">
        <div class="total-expense">
            <mat-icon>account_balance_wallet</mat-icon>
            <div class="child">
                <p>Total Expense</p>
                <p>$3500</p>
            </div>
        </div>
        <div class="num-transactions">
            <mat-icon>swap_horiz</mat-icon>
            <div class="child">
                <p>Transactions</p>
                <p>120</p>
            </div>
        </div>
        <div class="max-expense">
            <mat-icon> attach_money</mat-icon>
            <div class="child">
                <p>Max Expense</p>
                <p>$420</p>
            </div>
        </div>
        <div class="change">
            @if(true){
            <mat-icon>trending_up</mat-icon>
            } @else{
            <mat-icon>trending_up</mat-icon>
            }
            <div class="child">
                <p>Change</p>
                <p>+15,8%</p>
            </div>
        </div>

    </section>
    <section class="chart">

    </section>

    <section class="transection-detail">

    </section>
</div>
