<app-header></app-header>
<div class="expense-list">
    <app-dark-mode-wrapper></app-dark-mode-wrapper>
    <section class="create-section">
        <button class="create-btn" (click)="openCreateExpenseModal()">
            Create New Expense
        </button>
    </section>
    <dark-mode-toggle></dark-mode-toggle>
    <app-filter (filterChange)="onFitlerChanged($event)" [inputDataSource]="dataSource"></app-filter>


    <ng-container>
        <table mat-table [dataSource]="dataSource" *ngIf="dataSource && dataSource.data.length > 0; else noData ">
            <!--- Note that these columns can be defined in any order.
    The actual rendered columns are set as a property on the row definition" -->

            <!-- Position Column -->
            <ng-container matColumnDef="date">
                <th mat-header-cell *matHeaderCellDef>Date</th>
                <td mat-cell *matCellDef="let element"> {{element.date.toDate() | date: 'dd/MM/yyyy' }} </td>
            </ng-container>

            <!-- Name Column -->
            <ng-container matColumnDef="description">
                <th mat-header-cell *matHeaderCellDef>Description</th>
                <td mat-cell *matCellDef="let element"> {{element.description}} </td>
            </ng-container>

            <!-- Weight Column -->
            <ng-container matColumnDef="purpose">
                <th mat-header-cell *matHeaderCellDef>Purpose</th>
                <td mat-cell *matCellDef="let element"> {{element.purpose}} </td>
            </ng-container>

            <!-- Symbol Column -->
            <ng-container matColumnDef="paid">
                <th mat-header-cell *matHeaderCellDef>Paid Method</th>
                <td mat-cell *matCellDef="let element"> {{element.paid | enumToString}} </td>
            </ng-container>

            <ng-container matColumnDef="for">
                <th mat-header-cell *matHeaderCellDef>For</th>
                <td mat-cell *matCellDef="let element"> {{element.for}} </td>
            </ng-container>

            <ng-container matColumnDef="amount">
                <th mat-header-cell *matHeaderCellDef>Amount</th>
                <td mat-cell *matCellDef="let element"> {{element.amount | number: '3.0-0'}} </td>
            </ng-container>

            <ng-container matColumnDef="action">
                <th mat-header-cell *matHeaderCellDef></th>
                <td mat-cell *matCellDef="let element">
                    <a (click)="openDeleteConfirmModal(element.id)" class="button" aria-label="delete-btn">
                        <mat-icon color="warn">delete</mat-icon>
                    </a>
                    <a (click)="openEditExpenseModal(element)" class="button" aria-label="edit-btn">
                        <mat-icon color="accent">edit</mat-icon>
                    </a>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        </table>
    </ng-container>

    <ng-template #noData>
        <div class="no-data">
            No data available
        </div>
    </ng-template>

        <ngb-pagination [collectionSize]="(total$ | async)!" [(page)]="service.page" [pageSize]="service.pageSize">
        </ngb-pagination>

        <select class="form-select" style="width: auto" name="pageSize" [(ngModel)]="service.pageSize">
            <option [ngValue]="2">2 items per page</option>
            <option [ngValue]="4">4 items per page</option>
            <option [ngValue]="6">6 items per page</option>
        </select>
    </div> -->
</div>
<app-footer></app-footer>
