<!-- main-layout.component.html -->
<mat-sidenav-container class="sidenav-container">
    <!-- Sidebar -->
    <mat-sidenav mode="side" [opened]="true" [fixedInViewport]="true" [class.collapsed]="collapsed">
        <app-sidebar [collapsed]="collapsed" (toggle)="toggleSidebar()" (logout)="logout()"></app-sidebar>
    </mat-sidenav>

    <!-- Content -->
    <mat-sidenav-content [class.collapsed]="collapsed">
        <router-outlet></router-outlet>
    </mat-sidenav-content>
</mat-sidenav-container>
